name: Auto Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            cd ~/health-report-system
            
            # Pull latest code dari GitHub
            git pull origin main
            
            # Hapus container lama
            docker rm -f health-report-container || true
            
            # Hapus image lama untuk rebuild fresh
            docker image rm -f cubadakanda/health-report-system:latest || true
            
            # Build image baru
            docker build -t cubadakanda/health-report-system:latest .
            
            # Push ke Docker Hub (optional)
            docker push cubadakanda/health-report-system:latest || true
            
            # Jalankan container baru
            docker run -d \
              --name health-report-container \
              -p 3000:3000 \
              --env-file .env \
              --restart unless-stopped \
              cubadakanda/health-report-system:latest
            
            # Tunggu & verifikasi
            sleep 5
            docker logs health-report-container | grep "Server running"
